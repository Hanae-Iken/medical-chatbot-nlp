<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot Médical</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 90%;
            max-width: 800px;
            height: 90vh;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .chat-container {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background: #f5f5f5;
        }

        .message {
            margin-bottom: 15px;
            display: flex;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 15px;
            word-wrap: break-word;
        }

        .message.user .message-content {
            background: #667eea;
            color: white;
            border-bottom-right-radius: 5px;
        }

        .message.bot .message-content {
            background: white;
            color: #333;
            border-bottom-left-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .analysis {
            margin-top: 10px;
            padding: 10px;
            background: #e3f2fd;
            border-radius: 8px;
            font-size: 13px;
        }

        .analysis-item {
            margin: 5px 0;
            padding: 5px;
            background: white;
            border-radius: 5px;
        }

        .urgence {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: bold;
            margin-left: 5px;
        }

        .urgence.faible {
            background: #c8e6c9;
            color: #2e7d32;
        }

        .urgence.modérée {
            background: #fff9c4;
            color: #f57f17;
        }

        .urgence.élevée {
            background: #ffcdd2;
            color: #c62828;
        }

        .input-container {
            padding: 20px;
            background: white;
            border-top: 1px solid #e0e0e0;
        }

        .input-wrapper {
            display: flex;
            gap: 10px;
        }

        #userInput {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
        }

        #userInput:focus {
            border-color: #667eea;
        }

        button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: transform 0.2s;
        }

        button:hover {
            transform: scale(1.05);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: scale(1);
        }

        .typing-indicator {
            display: none;
            padding: 10px;
            background: white;
            border-radius: 15px;
            width: 60px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .typing-indicator.active {
            display: flex;
            gap: 4px;
            justify-content: center;
            align-items: center;
        }

        .dot {
            width: 8px;
            height: 8px;
            background: #667eea;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }

        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        .error-message {
            background: #ffebee;
            color: #c62828;
            padding: 10px;
            border-radius: 8px;
            margin: 10px 0;
            text-align: center;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .controls button {
            flex: 1;
            font-size: 12px;
            padding: 8px 16px;
        }

        .stats {
            font-size: 12px;
            color: #666;
            text-align: center;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏥 Chatbot Médical</h1>
            <p>Assistant virtuel pour vos questions de santé</p>
        </div>

        <div class="chat-container" id="chatContainer">
            <div class="message bot">
                <div class="message-content">
                    Bonjour ! Je suis votre assistant médical virtuel. Décrivez-moi vos symptômes et je vous aiderai du mieux que je peux. 
                    <br><br>
                    ⚠️ <strong>Important :</strong> Je ne remplace pas un médecin. Consultez un professionnel pour un diagnostic fiable.
                </div>
            </div>
        </div>

        <div class="input-container">
            <div class="input-wrapper">
                <input 
                    type="text" 
                    id="userInput" 
                    placeholder="Décrivez vos symptômes..."
                    onkeypress="handleKeyPress(event)"
                >
                <button onclick="sendMessage()" id="sendButton">Envoyer</button>
            </div>
            <div class="controls">
                <button onclick="resetChat()">🔄 Nouvelle conversation</button>
                <button onclick="showStats()">📊 Statistiques</button>
            </div>
            <div class="stats" id="statsDiv"></div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:5000/api';
        let sessionId = 'session_' + Date.now();

        function addMessage(content, isUser = false, analysis = null) {
            const chatContainer = document.getElementById('chatContainer');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user' : 'bot'}`;

            let messageHTML = `<div class="message-content">${content}</div>`;

            if (analysis && analysis.length > 0) {
                messageHTML += '<div class="analysis">';
                messageHTML += '<strong>📋 Analyse automatique:</strong>';
                analysis.forEach(item => {
                    messageHTML += `
                        <div class="analysis-item">
                            <strong>${item.diagnostic}</strong>
                            <span class="urgence ${item.urgence}">${item.urgence}</span>
                            <br>
                            <small>Spécialité: ${item.specialite} | Confiance: ${(item.score * 100).toFixed(0)}%</small>
                        </div>
                    `;
                });
                messageHTML += '</div>';
            }

            messageDiv.innerHTML = messageHTML;
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function showTyping() {
            const chatContainer = document.getElementById('chatContainer');
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message bot';
            typingDiv.id = 'typingIndicator';
            typingDiv.innerHTML = `
                <div class="typing-indicator active">
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                </div>
            `;
            chatContainer.appendChild(typingDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function hideTyping() {
            const typingIndicator = document.getElementById('typingIndicator');
            if (typingIndicator) {
                typingIndicator.remove();
            }
        }

        function showError(message) {
            const chatContainer = document.getElementById('chatContainer');
            const errorDiv = document.createElement('div');
            errorDiv.className = 'error-message';
            errorDiv.textContent = '❌ ' + message;
            chatContainer.appendChild(errorDiv);
            setTimeout(() => errorDiv.remove(), 5000);
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const sendButton = document.getElementById('sendButton');
            const message = input.value.trim();

            if (!message) return;

            // Afficher le message utilisateur
            addMessage(message, true);
            input.value = '';
            sendButton.disabled = true;
            showTyping();

            try {
                const response = await fetch(`${API_URL}/chat`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        message: message,
                        session_id: sessionId
                    })
                });

                if (!response.ok) {
                    throw new Error('Erreur serveur');
                }

                const data = await response.json();
                hideTyping();
                addMessage(data.reponse, false, data.analyse);

            } catch (error) {
                hideTyping();
                showError('Impossible de contacter le serveur. Vérifiez que le backend est démarré.');
                console.error('Erreur:', error);
            } finally {
                sendButton.disabled = false;
                input.focus();
            }
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        function resetChat() {
            if (confirm('Voulez-vous vraiment démarrer une nouvelle conversation ?')) {
                sessionId = 'session_' + Date.now();
                document.getElementById('chatContainer').innerHTML = `
                    <div class="message bot">
                        <div class="message-content">
                            Nouvelle conversation démarrée. Comment puis-je vous aider ?
                        </div>
                    </div>
                `;
            }
        }

        async function showStats() {
            try {
                const response = await fetch(`${API_URL}/stats`);
                const data = await response.json();
                const statsDiv = document.getElementById('statsDiv');
                statsDiv.innerHTML = `
                    Conditions: ${data.nombre_conditions} | 
                    Sessions: ${data.sessions_actives} | 
                    Messages: ${data.total_messages}
                `;
            } catch (error) {
                console.error('Erreur stats:', error);
            }
        }

        // Focus automatique sur l'input au chargement
        window.onload = () => {
            document.getElementById('userInput').focus();
        };
    </script>
</body>
</html>
